# Per-function config. See: https://supabase.com/docs/guides/functions/function-configuration

# Gateway JWT verification is disabled so the request reaches the function.
# The function validates the user JWT itself via createClientFromReq + getAuthUser.
[functions.create_reservation]
verify_jwt = false

[functions.approve_reservation]
verify_jwt = false

[functions.push_notify]
verify_jwt = false

[functions.expire_unpaid_reservations]
verify_jwt = false

[functions.send_reminder]
verify_jwt = false
